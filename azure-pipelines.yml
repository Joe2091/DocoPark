trigger:
  branches:
    include:
      - main

pool:
  vmImage: "ubuntu-latest"

variables:
  buildConfiguration: "Release"

stages:
  - stage: Build
    jobs:
      - job: BuildAndTest
        steps:
          - task: UseDotNet@2
            inputs:
              packageType: "sdk"
              version: "9.0.200"

          - script: dotnet restore DocoPark1.slnx
            displayName: "Restore packages"

          - script: dotnet build DocoPark1.slnx --configuration $(buildConfiguration) --no-restore
            displayName: "Build solution"

          - script: dotnet publish DocoPark1/DocoParkWebApp.csproj --configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)
            displayName: "Publish"

          - task: PublishBuildArtifacts@1
            inputs:
              PathtoPublish: "$(Build.ArtifactStagingDirectory)"
              ArtifactName: "drop"

  - stage: Deploy
    dependsOn: Build
    condition: succeeded()
    jobs:
      - deployment: DeployToAppService
        environment: "DocoParkProduction"
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebApp@1
                  inputs:
                    azureSubscription: "AzureServiceConnection"
                    appType: "webAppLinux"
                    appName: "DocoPark1"
                    package: "$(Pipeline.Workspace)/drop"
                    appSettings: '-ConnectionStrings__DefaultConnection "$(ConnectionString)"'
