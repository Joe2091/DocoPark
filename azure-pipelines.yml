trigger:
  branches:
    include:
      - main

pool:
  vmImage: "ubuntu-latest"

variables:
  buildConfiguration: "Release"
  dotnetVersion: "9.0.200" # Centralize version

stages:
  - stage: Build
    jobs:
      - job: BuildAndTest
        steps:
          - task: UseDotNet@2
            displayName: "Install .NET SDK"
            inputs:
              packageType: "sdk"
              version: $(dotnetVersion)

          - script: dotnet restore DocoPark1.slnx
            displayName: "Restore packages"

          - script: dotnet build DocoPark1.slnx --configuration $(buildConfiguration) --no-restore
            displayName: "Build solution"

          - script: dotnet test DocoPark1.slnx --configuration $(buildConfiguration) --no-build --logger trx
            displayName: "Run tests"
            condition: succeededOrFailed()

          - task: PublishTestResults@2
            displayName: "Publish test results"
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: "VSTest"
              testResultsFiles: "**/*.trx"

          - script: dotnet publish DocoPark1/DocoParkWebApp.csproj --configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory) --no-build
            displayName: "Publish"

          - task: PublishBuildArtifacts@1
            inputs:
              PathtoPublish: "$(Build.ArtifactStagingDirectory)"
              ArtifactName: "drop"

  - stage: Deploy
    dependsOn: Build
    condition: succeeded()
    jobs:
      - deployment: DeployToAppService
        environment: "DocoParkProduction" # IMPROVEMENT 3: Consider adding manual approval in Azure DevOps
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebApp@1
                  displayName: "Deploy to Azure App Service"
                  inputs:
                    azureSubscription: "docopark"
                    appType: "webAppLinux"
                    appName: "joedocopark"
                    package: "$(Pipeline.Workspace)/drop"
                    appSettings: '-ConnectionStrings__DefaultConnection "$(ConnectionString)"'

                # Deployment Verification
                - script: |
                    echo "Verifying deployment to https://joedocopark.azurewebsites.net"
                    curl -f https://joedocopark.azurewebsites.net || exit 1
                  displayName: "Verify deployment"
                  continueOnError: true
