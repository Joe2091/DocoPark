trigger:
  branches:
    include:
      - main

pool:
  vmImage: "ubuntu-latest"

variables:
  buildConfiguration: "Release"

stages:
  - stage: Build
    jobs:
      - job: BuildAndTest
        steps:
          - task: UseDotNet@2
            displayName: "Install .NET 8 SDK"
            inputs:
              packageType: "sdk"
              version: "8.x"

          - script: dotnet restore DocoPark1.slnx
            displayName: "Restore packages"

          - script: dotnet build DocoPark1.slnx --configuration $(buildConfiguration) --no-restore
            displayName: "Build solution"

          - script: dotnet test DocoPark1.slnx --configuration $(buildConfiguration) --no-build --logger trx
            displayName: "Run tests"
            condition: succeededOrFailed()

          - task: PublishTestResults@2
            displayName: "Publish test results"
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: "VSTest"
              testResultsFiles: "**/*.trx"

          - task: DotNetCoreCLI@2
            displayName: "Publish"
            inputs:
              command: "publish"
              publishWebProjects: false
              projects: "DocoPark1/DocoPark1.csproj"
              arguments: "--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)"
              zipAfterPublish: true

          - task: PublishBuildArtifacts@1
            inputs:
              PathtoPublish: "$(Build.ArtifactStagingDirectory)"
              ArtifactName: "drop"

  - stage: Deploy
    dependsOn: Build
    condition: succeeded()
    jobs:
      - deployment: DeployToAppService
        environment: "DocoParkProduction"
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebApp@1
                  displayName: "Deploy to Azure App Service"
                  inputs:
                    azureSubscription: "docopark"
                    appType: "webAppLinux"
                    appName: "joedocopark"
                    package: "$(Pipeline.Workspace)/drop/*.zip"

                - script: |
                    echo "Waiting for app to start..."
                    sleep 30
                    curl -f -k --retry 5 --retry-delay 10 https://joedocopark-abbucqckefafahey.belgiumcentral-01.azurewebsites.net || echo "Verification failed"
                  displayName: "Verify deployment"
                  continueOnError: true
